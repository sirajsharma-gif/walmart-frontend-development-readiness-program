<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day 1</title>
  </head>
  <body>
    <!-- Header -->
    <header>
      <a>
        <img src="./src/assets/images/logo.svg" alt="Sneaker Company Logo" />
      </a>
      <nav>
        <ul>
          <li><a href="/collections">Collections</a></li>
          <li><a href="/men">Men</a></li>
          <li><a href="/women">Women</a></li>
          <li><a href="/about">About</a></li>
          <li><a href="/contact">Contact</a></li>
        </ul>
      </nav>
      <div>
        <button>
          <img src="./src/assets/icons/icon-cart.svg" alt="Cart" />
        </button>
        <button>
          <img src="./src/assets/images/image-avatar.png" alt="Avatar" />
        </button>
      </div>
    </header>
    <!-- Header End -->

    <!-- Main Content -->
    <main>
      <section>
        <picture>
          <img
            src="./src/assets/images/image-product-1.jpg"
            alt="Product Image 1"
          />
        </picture>
        <ul>
          <li>
            <button>
              <img
                src="./src/assets/images/image-product-1-thumbnail.jpg"
                alt="Product Thumbnail 1"
              />
            </button>
          </li>
          <li>
            <button>
              <img
                src="./src/assets/images/image-product-2-thumbnail.jpg"
                alt="Product Thumbnail 2"
              />
            </button>
          </li>
          <li>
            <button>
              <img
                src="./src/assets/images/image-product-3-thumbnail.jpg"
                alt="Product Thumbnail 3"
              />
            </button>
          </li>
          <li>
            <button>
              <img
                src="./src/assets/images/image-product-4-thumbnail.jpg"
                alt="Product Thumbnail 4"
              />
            </button>
          </li>
        </ul>
      </section>
      <section>
        <h1>Sneaker Company</h1>
        <h2>Fall Limited Edition Sneakers</h2>
        <p>
          These low-profile sneakers are your perfect casual wear companion.
          Featuring a durable rubber outer sole, they’ll withstand everything
          the weather can offer.
        </p>
        <div>
          <span>&dollar;125.00</span>
          <span>50&percnt;</span>
        </div>
        <s>&dollar;250.00</s>

        <form>
          <div>
            <button>
              <img src="./src/assets/icons/icon-minus.svg" alt="Minus" />
            </button>
            <span>0</span>
            <button>
              <img src="./src/assets/icons/icon-plus.svg" alt="Plus" />
            </button>
          </div>
          <button>
            <img src="./src/assets/icons/icon-cart.svg" alt="" />
            Add to cart
          </button>
        </form>
      </section>
    </main>
    <!-- Main Content End -->

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
